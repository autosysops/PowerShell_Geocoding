on: [pull_request]

jobs:
  validate:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v1
    - name: Install Prerequisites
      run: .\build\vsts-prerequisites.ps1
      shell: powershell
    - name: Validate
      run: .\build\vsts-validate.ps1
      shell: powershell
      env:
        AZURE_MAPS_KEY: ${{ vars.AZURE_MAPS_KEY }}
        GOOGLE_MAPS_KEY: ${{ vars.GOOGLE_MAPS_KEY }}